{
  "plugin_type": "mappers",
  "name": "meltano-map-transformer",
  "namespace": "meltano_map_transformer",
  "variant": "meltano",
  "label": "Meltano Map Transformer",
  "docs": "https://hub.meltano.com/mappers/meltano-map-transformer--meltano",
  "repo": "https://github.com/MeltanoLabs/meltano-map-transform",
  "pip_url": "meltano-map-transform",
  "executable": "meltano-map-transform",
  "description": "A map transformer which implements the Stream Maps capability from Meltano's tap and target SDK.",
  "logo_url": "https://hub.meltano.com/assets/logos/mappers/meltano.png",
  "capabilities": [
    "about",
    "stream-maps",
    "schema-flattening",
    "structured-logging"
  ],
  "settings_group_validation": [
    [
      "stream_maps"
    ]
  ],
  "settings": [
    {
      "name": "stream_maps",
      "kind": "object",
      "label": "Stream Maps",
      "description": "Config object for stream maps capability. For more information check out [Stream Maps](https://sdk.meltano.com/en/latest/stream_maps.html)."
    },
    {
      "name": "stream_map_config",
      "kind": "object",
      "label": "User Stream Map Configuration",
      "description": "User-defined config values to be used within map expressions."
    },
    {
      "name": "flattening_enabled",
      "kind": "boolean",
      "label": "Enable Schema Flattening",
      "description": "'True' to enable schema flattening and automatically expand nested properties."
    },
    {
      "name": "flattening_max_depth",
      "kind": "integer",
      "label": "Max Flattening Depth",
      "description": "The max depth to flatten schemas."
    },
    {
      "name": "flattening_max_key_length",
      "kind": "integer",
      "label": "Max Key Length",
      "description": "The maximum length of a flattened key."
    },
    {
      "name": "faker_config.locale",
      "kind": "array",
      "label": "Faker Locale",
      "description": "One or more LCID locale strings to produce localized output for: https://faker.readthedocs.io/en/master/#localization"
    },
    {
      "name": "faker_config.seed",
      "kind": "string",
      "label": "Faker Seed",
      "description": "Value to seed the Faker generator for deterministic output: https://faker.readthedocs.io/en/master/#seeding-the-generator"
    }
  ]
}
